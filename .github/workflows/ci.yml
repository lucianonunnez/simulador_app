name: CI

on:
  pull_request:
  push:
    branches: [main]

# Least-privilege: al workflow le alcanza con leer el repo (checkout). Sin
# esto el GITHUB_TOKEN hereda los permisos amplios por default.
permissions:
  contents: read

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Liviano a propósito: lint + smoke tests no necesitan TensorFlow/LightGBM
      # (se cargan con import lazy). streamlit + pandas/numpy alcanzan para
      # importar los módulos core/ui bajo test.
      - name: Instalar herramientas
        run: pip install --no-cache-dir -r requirements-dev.txt pandas numpy streamlit

      - name: Lint (ruff)
        run: ruff check src tests

      - name: Tests
        env:
          PYTHONPATH: src
        run: pytest tests/ -q
