# ============================================================================
# Configuración visual y de servidor de Streamlit
# ============================================================================

[theme]
# Paleta Swiss Medical
primaryColor = "#E4002B"
backgroundColor = "#F8F9FA"
secondaryBackgroundColor = "#FFFFFF"
textColor = "#212529"
font = "sans serif"

[server]
# Max upload size (MB).
maxUploadSize = 200

# DESPLIEGUE LOCAL EN LA LAN (configuración actual, ver docs/DESPLIEGUE_SEGURO.md).
# Al servir por IP en la red corporativa, estas protecciones DEBEN estar activas:
# son la defensa contra CSRF y contra peticiones cross-origin maliciosas.
enableCORS = true
enableXsrfProtection = true

# NOTA: si en algún momento se despliega en Hugging Face Spaces (proxy + Docker),
# ambas deben ir en false porque el proxy de HF no reenvía bien los tokens XSRF
# (provoca 403 en st.file_uploader). Pero para correr local en la LAN, van en true.

[browser]
gatherUsageStats = false
